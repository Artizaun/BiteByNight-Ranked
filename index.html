<!DOCTYPE html>
<html>
<head>
  <title>Bite by Night Ranked</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 50px;
      color: #a855f7;
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #a855f7;
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 10px;
    }

    .result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Bit by Nite Ranked</h1>

  <p>Check if a player is in-game</p>

  <input id="userId" placeholder="Enter Roblox User ID" />
  <button onclick="checkPlayer()">Check</button>

  <div class="result" id="result"></div>

  <script>
    async function checkPlayer() {
      const userId = document.getElementById("userId").value;

      const res = await fetch("http://localhost:3000/check-presence", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userId: Number(userId) })
      });

      const data = await res.json();

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
